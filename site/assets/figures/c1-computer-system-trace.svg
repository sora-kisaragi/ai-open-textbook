<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">印刷依頼の状態変化とOSによる資源利用の仲介</title>
  <desc id="desc">上段は入力、主記憶上のアプリケーション状態、処理、出力という値の流れ。保存装置はアプリケーション状態と読み書きする。下段のOSから各要素への破線は、OSが主記憶、処理装置、ファイル、入力装置、出力装置の利用を仲介することを示す。OSを値の流れの一段階としては描かない。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 3; rx: 8; }
      .state { fill: #e8f1ff; }
      .hardware { fill: #fff5d6; }
      .io { fill: #eaf7ea; }
      .os { fill: #f3e8ff; }
      .label { font: 700 21px sans-serif; fill: #111827; text-anchor: middle; }
      .small { font: 15px sans-serif; fill: #111827; text-anchor: middle; }
      .flow { fill: none; stroke: #1f2937; stroke-width: 3; marker-end: url(#arrow); }
      .resource { fill: none; stroke: #5b21b6; stroke-width: 3; stroke-dasharray: 9 6; }
    </style>
  </defs>

  <text x="480" y="26" class="label">アプリケーションの値と状態の流れ</text>

  <rect x="20" y="65" width="145" height="90" class="box io"/>
  <text x="92" y="101" class="label">1 入力</text>
  <text x="92" y="130" class="small">部数・印刷指示</text>

  <rect x="215" y="55" width="245" height="110" class="box state"/>
  <text x="337" y="94" class="label">2 アプリの状態</text>
  <text x="337" y="122" class="small">主記憶上の部数・残り枚数</text>
  <text x="337" y="146" class="small">受付済み → 処理中 → 完了</text>

  <rect x="510" y="65" width="180" height="90" class="box hardware"/>
  <text x="600" y="101" class="label">3 処理</text>
  <text x="600" y="130" class="small">命令を実行し状態を更新</text>

  <rect x="740" y="65" width="190" height="90" class="box io"/>
  <text x="835" y="101" class="label">4 出力</text>
  <text x="835" y="130" class="small">画面・プリンター</text>

  <rect x="230" y="225" width="215" height="82" class="box hardware"/>
  <text x="337" y="258" class="label">保存装置</text>
  <text x="337" y="286" class="small">保存済みファイル</text>

  <path d="M165 110 H215" class="flow"/>
  <path d="M460 110 H510" class="flow"/>
  <path d="M690 110 H740" class="flow"/>
  <path d="M315 165 V225" class="flow"/>
  <path d="M360 225 V165" class="flow"/>

  <rect x="140" y="350" width="680" height="62" class="box os"/>
  <text x="480" y="377" class="label">OS: 資源と装置の利用を仲介</text>
  <text x="480" y="401" class="small">主記憶の領域・処理装置を使う時間・ファイル・入力装置・出力装置</text>

  <path d="M220 350 L92 155" class="resource"/>
  <path d="M365 350 L337 165" class="resource"/>
  <path d="M480 350 L337 307" class="resource"/>
  <path d="M595 350 L600 155" class="resource"/>
  <path d="M740 350 L835 155" class="resource"/>
</svg>
