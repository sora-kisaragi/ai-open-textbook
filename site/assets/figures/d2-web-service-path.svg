<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">DNSとWebサービスの二つのやり取り</title>
  <desc id="desc">上段は端末とDNSサーバーの間の問い合わせと応答、下段は端末とWebサービスの間の接続、TLS、HTTP要求と応答を示す。どちらも、アプリケーションのメッセージがトランスポート、IP、ローカルネットワークとルーターの入れ子の中を通る。要求は右向き実線、応答は左向き破線で、番号と語句も付ける。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 3; }
      .dns-panel { fill: #e8f1ff; }
      .web-panel { fill: #eaf7ea; }
      .stack-outer { fill: #fff8df; stroke: #1f2937; stroke-width: 3; }
      .stack-ip { fill: #ffffff; stroke: #1f2937; stroke-width: 2.5; }
      .stack-transport { fill: #f4f4f5; stroke: #1f2937; stroke-width: 2.5; }
      .stack-tls { fill: #ffffff; stroke: #1f2937; stroke-width: 2; stroke-dasharray: 5 4; }
      .heading { font: 700 23px sans-serif; fill: #111827; }
      .label { font: 700 18px sans-serif; fill: #111827; text-anchor: middle; }
      .small { font: 15px sans-serif; fill: #111827; text-anchor: middle; }
      .layer-label { font: 700 15px sans-serif; fill: #111827; }
      .request { fill: none; stroke: #1f2937; stroke-width: 4; marker-end: url(#arrow); }
      .response { fill: none; stroke: #1f2937; stroke-width: 4; stroke-dasharray: 11 8; marker-end: url(#arrow); }
      .flow-label { font: 700 15px sans-serif; fill: #111827; paint-order: stroke; stroke: #ffffff; stroke-width: 6px; stroke-linejoin: round; }
      .legend { font: 15px sans-serif; fill: #111827; }
    </style>
  </defs>

  <text x="20" y="38" class="heading">1　DNSへの問い合わせと応答</text>

  <rect x="20" y="150" width="180" height="115" rx="12" class="panel dns-panel"/>
  <text x="110" y="190" class="label">端末</text>
  <text x="110" y="220" class="small">DNSクライアント</text>

  <rect x="225" y="85" width="620" height="210" rx="14" class="stack-outer"/>
  <text x="245" y="112" class="layer-label">D1: ローカルネットワーク（スイッチなど）とルーター</text>
  <rect x="255" y="122" width="560" height="145" rx="12" class="stack-ip"/>
  <text x="275" y="148" class="layer-label">IP: DNSサーバーのIPアドレスを宛先にする</text>
  <rect x="290" y="158" width="490" height="105" rx="10" class="stack-transport"/>
  <text x="310" y="183" class="layer-label">トランスポート: DNSメッセージを運ぶ</text>

  <rect x="870" y="150" width="210" height="115" rx="12" class="panel dns-panel"/>
  <text x="975" y="190" class="label">DNSサーバー</text>
  <text x="975" y="220" class="small">名前とIPの情報を返す</text>

  <path d="M200 215 H870" class="request"/>
  <text x="330" y="209" class="flow-label">1a DNS問い合わせ: ホスト名 →</text>
  <path d="M870 250 H200" class="response"/>
  <text x="330" y="246" class="flow-label">← 1b DNS応答: IPアドレス</text>

  <text x="20" y="340" class="heading">2　Webサービスへの接続、要求、応答</text>

  <rect x="20" y="430" width="180" height="145" rx="12" class="panel web-panel"/>
  <text x="110" y="472" class="label">端末</text>
  <text x="110" y="502" class="small">ブラウザー</text>

  <rect x="225" y="365" width="620" height="235" rx="14" class="stack-outer"/>
  <text x="245" y="392" class="layer-label">D1: ローカルネットワーク（スイッチなど）とルーター</text>
  <rect x="255" y="402" width="560" height="170" rx="12" class="stack-ip"/>
  <text x="275" y="428" class="layer-label">IP: DNSで得たIPアドレスを宛先にする</text>
  <rect x="290" y="438" width="490" height="125" rx="10" class="stack-transport"/>
  <text x="310" y="463" class="layer-label">トランスポート: サービスとの通信を準備する</text>
  <rect x="325" y="473" width="420" height="40" rx="8" class="stack-tls"/>
  <text x="535" y="498" class="small">TLS: 参照名と証明書の識別名を照合（認証確認の一部）</text>

  <rect x="870" y="420" width="210" height="145" rx="12" class="panel web-panel"/>
  <text x="975" y="458" class="label">Webサーバー</text>
  <line x1="895" y1="475" x2="1055" y2="475" stroke="#1f2937" stroke-width="2"/>
  <text x="975" y="502" class="label">情報サービス</text>
  <text x="975" y="527" class="small">アプリ・データ・運用</text>

  <path d="M200 530 H870" class="request"/>
  <text x="330" y="524" class="flow-label">2a 接続とTLS、その後にHTTP要求 →</text>
  <path d="M870 558 H200" class="response"/>
  <text x="330" y="584" class="flow-label">← 2b HTTP応答</text>

  <line x1="25" y1="620" x2="115" y2="620" class="request"/>
  <text x="130" y="625" class="legend">実線・右向き: 問い合わせ／要求</text>
  <line x1="430" y1="620" x2="340" y2="620" class="response"/>
  <text x="445" y="625" class="legend">破線・左向き: 応答</text>
  <text x="700" y="625" class="legend">番号と見出しでも二つのやり取りを区別</text>
</svg>
