name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      - name: Install locked dependencies
        run: |
          python -m pip install uv==0.9.18
          uv sync --locked --extra dev
      - name: Install PDF browser and Japanese fonts
        run: |
          uv run python -m playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
      - name: Check PR revision history
        if: github.event_name == 'pull_request'
        run: uv run python scripts/check_revision_history.py --base-ref "${{ github.event.pull_request.base.sha }}"
      - name: Check push revision history
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: uv run python scripts/check_revision_history.py --base-ref "${{ github.event.before }}"
      - name: Validate canonical data and curriculum
        run: uv run python scripts/validate_ndjson.py
      - name: Build SQLite index
        run: uv run python scripts/build_sqlite_index.py
      - name: Check runnable examples
        run: uv run python scripts/check_examples.py
      - name: Build and verify offline site
        run: |
          uv run python scripts/build_static_site.py
          uv run python scripts/verify_static_site.py
      - name: Build and verify PDF
        run: |
          uv run python scripts/build_pdf.py --edition classroom
          uv run python scripts/build_pdf.py --edition self-study
      - name: Run tests
        run: uv run python -m pytest
      - name: Prose warnings
        run: uv run python scripts/check_prose_warnings.py --format github
      - name: Upload review artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: information-i-review-artifacts
          path: |
            build/site
            build/information-i-textbook.pdf
            build/information-i-textbook.manifest.json
            build/information-i-self-study.pdf
            build/information-i-self-study.manifest.json
          if-no-files-found: error
